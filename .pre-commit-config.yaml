# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: biome-format
        name: biome-format
        entry: biome format --write .
        language: system
        files: \.(ts|tsx|js|jsx)$

      - id: biome-lint
        name: biome-lint
        entry: biome lint --write .
        language: system
        files: \.(ts|tsx|js|jsx)$
